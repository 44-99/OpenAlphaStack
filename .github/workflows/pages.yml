name: Deploy GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'site/**'
      - 'docs/assets/openalphastack-*.png'
      - 'docs/assets/openalphastack-*.gif'
      - 'docs/assets/dashboard-search-results.png'
      - 'docs/assets/dashboard-stock-search.png'
      - 'docs/assets/dashboard-workflow.png'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          mkdir -p _site/assets
          cp -R site/. _site/
          cp docs/assets/openalphastack-demo.gif _site/assets/
          cp docs/assets/openalphastack-social-preview.png _site/assets/
          cp docs/assets/openalphastack-social-preview-en.png _site/assets/
          cp docs/assets/dashboard-search-results.png _site/assets/
          cp docs/assets/dashboard-stock-search.png _site/assets/
          cp docs/assets/dashboard-workflow.png _site/assets/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
