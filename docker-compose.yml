services:
  openalphastack:
    build: .
    container_name: openalphastack
    restart: unless-stopped
    ports:
      - "127.0.0.1:8800:8800"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
