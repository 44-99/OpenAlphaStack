services:
  alphaclaude:
    build: .
    container_name: alphaclaude-bot
    restart: unless-stopped
    ports:
      - "8800:8800"
    volumes:
      - ./data:/app/data
      - ~/.claude:/root/.claude
    env_file:
      - .env
    environment:
      - CLAUDE_CMD=claude
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
